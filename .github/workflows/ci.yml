name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Polaris
        run: python -m pip install -e .

      - name: Install test tooling
        run: python -m pip install pytest mcp

      - name: Compile Python sources
        run: python -m compileall polaris adapters scripts

      - name: Validate patterns
        run: python scripts/pattern_validator_v4.py

      - name: Run tests
        run: python -m pytest tests/ -x || [ $? = 5 ]

      - name: MCP stdio smoke
        run: python -m pytest tests/test_mcp_smoke.py -v

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Polaris
        run: python -m pip install -e .

      - name: Install test tooling
        run: python -m pip install pytest

      - name: Import legacy shim
        run: python -c "import adapters.mcp_polaris.server"

      - name: Run tar safety test
        run: python -m pytest tests/test_extract_packs.py
